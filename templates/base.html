<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Financial Market Insights{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <script src="{{ url_for('static', filename='morning_brief.js') }}" defer></script>
    {% block extra_head %}{% endblock %}
  </head>
  <body>
    <div class="ambient" aria-hidden="true">
      <div class="orb orb-a"></div>
      <div class="orb orb-b"></div>
      <div class="orb orb-c"></div>
      <div class="grain" aria-hidden="true"></div>
    </div>

    <div class="wrap {% block wrap_class %}{% endblock %}">
      <header class="top">
        <a href="{{ url_for('index') }}" class="brand brand-link" title="Home">
          <span class="brand-mark" aria-hidden="true"></span>
          <span class="brand-text">Financial Market <span class="brand-accent">Insights</span></span>
        </a>
        <div class="top-actions">
          <button type="button" class="btn secondary morning-brief-btn" id="morning-brief-btn">
            Morning Brief
          </button>
          <span class="live-pill">
            <span class="live-dot"></span>
            yfinance
          </span>
        </div>
      </header>

      <div id="morning-brief-modal" class="brief-modal" hidden aria-hidden="true">
        <div class="brief-modal-backdrop" data-brief-close></div>
        <div class="brief-modal-card" role="dialog" aria-modal="true" aria-labelledby="brief-modal-title">
          <header class="brief-modal-head">
            <div>
              <h2 id="brief-modal-title" class="brief-modal-title">Morning Brief</h2>
              <p class="brief-modal-meta" id="brief-modal-meta"></p>
            </div>
            <button type="button" class="brief-modal-close" data-brief-close aria-label="Close">×</button>
          </header>
          <div class="brief-modal-body" id="brief-modal-body"></div>
          <footer class="brief-modal-foot">
            <button type="button" class="btn secondary" id="brief-copy-btn">Copy to clipboard</button>
            <button type="button" class="btn secondary" id="brief-export-btn">Export .txt</button>
            <button type="button" class="btn primary" data-brief-close>Close</button>
          </footer>
        </div>
      </div>

      {% block content %}{% endblock %}

      <footer class="foot">
        <p>For research only — not investment advice.</p>
      </footer>
    </div>
  </body>
</html>
